<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOODBOARD — Meet BLOO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      transition: background 0.6s ease;
    }

    body.mood-inspired { background: #0d0b1e; }
    body.mood-blocked { background: #0a0a0f; }
    body.mood-caffeinated { background: #1a0f00; }
    body.mood-thinking { background: #0a0f1a; }
    body.mood-celebrating { background: #0f1a0a; }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: #666;
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .stage {
      position: relative;
      width: 320px;
      height: 360px;
      margin: 32px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: #6C63FF;
      filter: blur(70px);
      opacity: 0.2;
      transition: background 0.5s ease, opacity 0.5s ease;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .bloo-wrapper {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: idle-float 2.5s ease-in-out infinite;
    }

    .arms-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .arm {
      width: 45px;
      height: 22px;
      background: #6C63FF;
      border-radius: 50px;
      transition: transform 0.4s ease, background 0.5s ease;
      flex-shrink: 0;
    }

    .arm-left { transform-origin: right center; }
    .arm-right { transform-origin: left center; }

    .head {
      width: 160px;
      height: 160px;
      background: #6C63FF;
      border-radius: 50%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.5s ease;
      flex-shrink: 0;
    }

    .eyebrows {
      display: flex;
      gap: 36px;
      margin-bottom: 6px;
    }

    .eyebrow {
      width: 28px;
      height: 6px;
      background: white;
      border-radius: 10px;
      transition: transform 0.4s ease;
    }

    .eyes {
      display: flex;
      gap: 28px;
      margin-bottom: 10px;
    }

    .eye {
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .pupil {
      width: 12px;
      height: 12px;
      background: #1a1a2e;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .mouth {
      width: 44px;
      height: 16px;
      background: white;
      border-radius: 50px;
      transition: all 0.4s ease;
    }

    .legs {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .leg {
      width: 22px;
      height: 50px;
      background: #6C63FF;
      border-radius: 50px;
      transition: background 0.5s ease, transform 0.4s ease;
    }

    /* ANIMATIONS */
    @keyframes idle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes inspired-jump {
      0%, 100% { transform: translateY(0) scale(1,1); }
      20% { transform: translateY(-30px) scale(0.95,1.05); }
      40% { transform: translateY(0) scale(1.05,0.95); }
      60% { transform: translateY(-18px) scale(0.97,1.03); }
      80% { transform: translateY(0) scale(1.02,0.98); }
    }

    @keyframes blocked-slump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    @keyframes caff-shake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-8px) rotate(-4deg); }
      30% { transform: translateX(8px) rotate(4deg); }
      45% { transform: translateX(-6px) rotate(-2deg); }
      60% { transform: translateX(6px) rotate(2deg); }
      75% { transform: translateX(-4px) rotate(-3deg); }
      90% { transform: translateX(4px) rotate(3deg); }
    }

    @keyframes thinking-tilt {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-5deg); }
    }

    @keyframes celebrating-jump {
      0%, 100% { transform: translateY(0) scale(1,1); }
      15% { transform: translateY(-45px) scale(0.93,1.07); }
      30% { transform: translateY(0) scale(1.1,0.9); }
      50% { transform: translateY(-28px) scale(0.96,1.04); }
      65% { transform: translateY(0) scale(1.05,0.95); }
    }

    /* STATE CLASSES */
    .bloo-wrapper.inspired { animation: inspired-jump 0.8s ease-in-out infinite; }
    .bloo-wrapper.blocked { animation: blocked-slump 3s ease-in-out infinite; }
    .bloo-wrapper.caffeinated { animation: caff-shake 0.35s ease-in-out infinite; }
    .bloo-wrapper.thinking { animation: thinking-tilt 2s ease-in-out infinite; }
    .bloo-wrapper.celebrating { animation: celebrating-jump 0.7s ease-in-out infinite; }

    /* INSPIRED */
    .inspired .arm-left { transform: rotate(-50deg) translateY(-8px); }
    .inspired .arm-right { transform: rotate(50deg) translateY(-8px); }
    .inspired .eyebrow-left { transform: rotate(-8deg) translateY(-4px); }
    .inspired .eyebrow-right { transform: rotate(8deg) translateY(-4px); }
    .inspired .mouth { border-radius: 0 0 50px 50px; height: 20px; width: 54px; }
    .inspired .eye { width: 28px; height: 28px; }
    .inspired .head { background: #7C6FFF; }
    .inspired .arm, .inspired .leg { background: #7C6FFF; }

    /* BLOCKED */
    .blocked .arm-left { transform: rotate(30deg) translateY(6px); }
    .blocked .arm-right { transform: rotate(-30deg) translateY(6px); }
    .blocked .eyebrow-left { transform: rotate(15deg) translateY(4px); }
    .blocked .eyebrow-right { transform: rotate(-15deg) translateY(4px); }
    .blocked .mouth { border-radius: 50px 50px 0 0; background: #aaa; width: 36px; height: 14px; margin-top: 6px; }
    .blocked .head { background: #4a4a6a; }
    .blocked .arm, .blocked .leg { background: #4a4a6a; }
    .blocked .eye { width: 22px; height: 14px; }

    /* CAFFEINATED */
    .caffeinated .arm-left { transform: rotate(-70deg) translateY(-12px); }
    .caffeinated .arm-right { transform: rotate(70deg) translateY(-12px); }
    .caffeinated .eyebrow-left { transform: translateY(-6px); }
    .caffeinated .eyebrow-right { transform: translateY(-6px); }
    .caffeinated .mouth { width: 50px; height: 18px; }
    .caffeinated .eye { width: 30px; height: 30px; }
    .caffeinated .pupil { width: 8px; height: 8px; }
    .caffeinated .head { background: #8B6FFF; }
    .caffeinated .arm, .caffeinated .leg { background: #8B6FFF; }

    /* THINKING */
    .thinking .arm-left { transform: rotate(-20deg) translateY(4px); }
    .thinking .arm-right { transform: rotate(-60deg) translateY(-16px); }
    .thinking .eyebrow-left { transform: translateY(-3px); }
    .thinking .eyebrow-right { transform: translateY(-6px) rotate(-5deg); }
    .thinking .pupil { transform: translateY(-4px); }
    .thinking .mouth { width: 30px; height: 10px; border-radius: 50px; }
    .thinking .head { background: #5B8FFF; }
    .thinking .arm, .thinking .leg { background: #5B8FFF; }

    /* CELEBRATING */
    .celebrating .arm-left { transform: rotate(-80deg) translateY(-18px); }
    .celebrating .arm-right { transform: rotate(80deg) translateY(-18px); }
    .celebrating .eyebrow-left { transform: rotate(-10deg) translateY(-6px); }
    .celebrating .eyebrow-right { transform: rotate(10deg) translateY(-6px); }
    .celebrating .mouth { border-radius: 0 0 50px 50px; height: 22px; width: 60px; }
    .celebrating .eye { width: 30px; height: 30px; }
    .celebrating .head { background: #5FBF7F; }
    .celebrating .arm, .celebrating .leg { background: #5FBF7F; }

    /* SPARKLES */
    .sparkle, .coffee-drop, .confetti, .think-bubble {
      position: absolute;
      font-size: 1.3rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .show-inspired .sparkle { opacity: 1; }
    .show-caffeinated .coffee-drop { opacity: 1; }
    .show-celebrating .confetti { opacity: 1; }
    .show-thinking .think-bubble { opacity: 1; }

    .sp1 { top: 20px; left: 30px; animation: float1 1.2s ease-in-out infinite; }
    .sp2 { top: 30px; right: 20px; animation: float2 1s ease-in-out infinite 0.2s; }
    .sp3 { bottom: 80px; left: 20px; animation: float1 1.4s ease-in-out infinite 0.4s; }
    .cd1 { top: 10px; right: 30px; animation: float1 0.5s ease-in-out infinite; }
    .cd2 { top: 30px; left: 20px; animation: float2 0.5s ease-in-out infinite 0.1s; }
    .cf1 { top: 10px; left: 40px; animation: float1 0.6s ease-in-out infinite; }
    .cf2 { top: 20px; right: 30px; animation: float2 0.7s ease-in-out infinite 0.1s; }
    .cf3 { bottom: 60px; right: 20px; animation: float1 0.5s ease-in-out infinite 0.2s; }
    .tb1 { top: 15px; right: 20px; animation: float2 2s ease-in-out infinite; }
    .tb2 { top: 40px; right: 10px; font-size: 0.8rem; animation: float2 2s ease-in-out infinite 0.3s; }

    @keyframes float1 {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.2); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(20deg); }
    }

    /* MOOD LABEL */
    .mood-label {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      min-height: 28px;
      color: #6C63FF;
      transition: color 0.4s ease;
      text-align: center;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 500px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.3s;
      letter-spacing: 0.02em;
    }

    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: scale(0.96); }

    .btn-inspired { background: #6C63FF; color: #fff; }
    .btn-inspired.active { box-shadow: 0 0 28px #6C63FFaa; }

    .btn-blocked { background: #2a2a3a; color: #888; border: 1px solid #333; }
    .btn-blocked.active { box-shadow: 0 0 20px #444; color: #aaa; }

    .btn-caffeinated { background: #F59E0B; color: #1a1a1a; }
    .btn-caffeinated.active { box-shadow: 0 0 28px #F59E0Baa; }

    .btn-thinking { background: #3B6FFF; color: #fff; }
    .btn-thinking.active { box-shadow: 0 0 28px #3B6FFFaa; }

    .btn-celebrating { background: #22C55E; color: #fff; }
    .btn-celebrating.active { box-shadow: 0 0 28px #22C55Eaa; }

    .keyboard-hint {
      margin-top: 12px;
      font-size: 0.72rem;
      color: #333;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .tagline {
      margin-top: 24px;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>MOODBOARD</h1>
  <p class="subtitle">How are you feeling today?</p>

  <div class="stage" id="stage">
    <div class="glow" id="glow"></div>

    <span class="sparkle sp1">✨</span>
    <span class="sparkle sp2">⭐</span>
    <span class="sparkle sp3">💡</span>
    <span class="coffee-drop cd1">☕</span>
    <span class="coffee-drop cd2">⚡</span>
    <span class="confetti cf1">🎉</span>
    <span class="confetti cf2">🎊</span>
    <span class="confetti cf3">✦</span>
    <span class="think-bubble tb1">💭</span>
    <span class="think-bubble tb2">•••</span>

    <div class="bloo-wrapper" id="bloo">
      <div class="arms-row">
        <div class="arm arm-left"></div>
        <div class="head">
          <div class="eyebrows">
            <div class="eyebrow eyebrow-left"></div>
            <div class="eyebrow eyebrow-right"></div>
          </div>
          <div class="eyes">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
          <div class="mouth"></div>
        </div>
        <div class="arm arm-right"></div>
      </div>
      <div class="legs">
        <div class="leg"></div>
        <div class="leg"></div>
      </div>
    </div>
  </div>

  <div class="mood-label" id="mood-label">✦ Idle — just vibing</div>

  <div class="buttons">
    <button class="btn btn-inspired" onclick="setMood('inspired')">✨ Inspired</button>
    <button class="btn btn-blocked" onclick="setMood('blocked')">😩 Blocked</button>
    <button class="btn btn-caffeinated" onclick="setMood('caffeinated')">☕ Caffeinated</button>
    <button class="btn btn-thinking" onclick="setMood('thinking')">🤔 Thinking</button>
    <button class="btn btn-celebrating" onclick="setMood('celebrating')">🎉 Celebrating</button>
  </div>

  <p class="keyboard-hint">Keyboard: 1 = Inspired · 2 = Blocked · 3 = Caffeinated · 4 = Thinking · 5 = Celebrating</p>

  <p class="tagline">BUILT WITH RIVE · MOODBOARD · INTERACTIVE CHARACTER CHALLENGE</p>

  <script>
    const moods = {
      inspired: {
        label: '✨ Inspired — ready to create!',
        labelColor: '#8B83FF',
        glow: '#6C63FF',
        glowOpacity: '0.35',
        stageClass: 'show-inspired',
        bodyClass: 'mood-inspired'
      },
      blocked: {
        label: '😩 Blocked — send help (and snacks)',
        labelColor: '#555',
        glow: '#2a2a3a',
        glowOpacity: '0.1',
        stageClass: 'show-blocked',
        bodyClass: 'mood-blocked'
      },
      caffeinated: {
        label: '☕ Caffeinated — LETS GOOO!!',
        labelColor: '#F59E0B',
        glow: '#F59E0B',
        glowOpacity: '0.25',
        stageClass: 'show-caffeinated',
        bodyClass: 'mood-caffeinated'
      },
      thinking: {
        label: '🤔 Thinking — give me a moment...',
        labelColor: '#5B8FFF',
        glow: '#3B6FFF',
        glowOpacity: '0.25',
        stageClass: 'show-thinking',
        bodyClass: 'mood-thinking'
      },
      celebrating: {
        label: '🎉 Celebrating — WE DID IT!!',
        labelColor: '#22C55E',
        glow: '#22C55E',
        glowOpacity: '0.3',
        stageClass: 'show-celebrating',
        bodyClass: 'mood-celebrating'
      }
    };

    let currentMood = null;

    function setMood(mood) {
      const bloo = document.getElementById('bloo');
      const glow = document.getElementById('glow');
      const label = document.getElementById('mood-label');
      const stage = document.getElementById('stage');

      bloo.classList.remove('inspired','blocked','caffeinated','thinking','celebrating');
      stage.classList.remove('show-inspired','show-blocked','show-caffeinated','show-thinking','show-celebrating');
      document.body.classList.remove('mood-inspired','mood-blocked','mood-caffeinated','mood-thinking','mood-celebrating');

      if (currentMood === mood) {
        currentMood = null;
        label.textContent = '✦ Idle — just vibing';
        label.style.color = '#6C63FF';
        glow.style.background = '#6C63FF';
        glow.style.opacity = '0.2';
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        return;
      }

      currentMood = mood;
      bloo.classList.add(mood);
      stage.classList.add(moods[mood].stageClass);
      document.body.classList.add(moods[mood].bodyClass);
      label.textContent = moods[mood].label;
      label.style.color = moods[mood].labelColor;
      glow.style.background = moods[mood].glow;
      glow.style.opacity = moods[mood].glowOpacity;

      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.btn-' + mood).classList.add('active');
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const keys = { '1': 'inspired', '2': 'blocked', '3': 'caffeinated', '4': 'thinking', '5': 'celebrating' };
      if (keys[e.key]) setMood(keys[e.key]);
    });
  </script>

</body>
</html>
