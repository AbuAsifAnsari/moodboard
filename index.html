<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOODBOARD — Meet BLOO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      transition: background 0.6s ease;
      overflow: hidden;
    }

    body.mood-inspired { background: #0d0b1e; }
    body.mood-blocked { background: #0a0a0f; }
    body.mood-caffeinated { background: #1a0f00; }
    body.mood-thinking { background: #0a0f1a; }
    body.mood-celebrating { background: #0a1a0f; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      text-align: center;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #555;
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* SCENE */
    .scene {
      position: relative;
      width: 500px;
      height: 340px;
      margin: 20px auto 0;
    }

    /* GLOW */
    .glow {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #6C63FF;
      filter: blur(70px);
      opacity: 0.15;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: background 0.5s ease, opacity 0.5s ease;
      pointer-events: none;
    }

    /* DESK */
    .desk {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 70px;
      background: #2D2B55;
      border-radius: 12px;
      z-index: 1;
    }

    .desk::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 0;
      right: 0;
      height: 12px;
      background: #3D3A6A;
      border-radius: 8px 8px 0 0;
    }

    /* DESK PROPS */
    .coffee-cup {
      position: absolute;
      bottom: 68px;
      left: 80px;
      z-index: 2;
      transition: transform 0.3s ease;
    }

    .cup-body {
      width: 32px;
      height: 40px;
      background: #FF6B6B;
      border-radius: 4px 4px 8px 8px;
    }

    .cup-rim {
      width: 36px;
      height: 8px;
      background: #FF8E8E;
      border-radius: 4px;
      margin-left: -2px;
      margin-bottom: 2px;
    }

    .cup-steam {
      position: absolute;
      top: -14px;
      left: 8px;
      font-size: 0.8rem;
      opacity: 0.6;
      animation: steam 2s ease-in-out infinite;
    }

    @keyframes steam {
      0%, 100% { transform: translateY(0) rotate(-5deg); opacity: 0.6; }
      50% { transform: translateY(-6px) rotate(5deg); opacity: 0.3; }
    }

    .sticky-notes {
      position: absolute;
      bottom: 68px;
      right: 70px;
      z-index: 2;
      display: flex;
      gap: -8px;
    }

    .note {
      width: 52px;
      height: 52px;
      border-radius: 4px;
      position: relative;
    }

    .note-1 { background: #FFE566; transform: rotate(-6deg); z-index: 2; }
    .note-2 { background: #66FFB2; transform: rotate(4deg) translateX(-10px); z-index: 1; }

    .pencil {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%) rotate(15deg);
      width: 8px;
      height: 55px;
      background: linear-gradient(to bottom, #FFD700 80%, #FF8C00 100%);
      border-radius: 3px 3px 0 0;
      z-index: 2;
    }

    .pencil::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 8px solid #CC9900;
    }

    /* BLOO CHARACTER */
    .bloo-wrapper {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: idle-float 2.5s ease-in-out infinite;
      transform-origin: bottom center;
    }

    .arms-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .arm {
      width: 42px;
      height: 20px;
      background: #6C63FF;
      border-radius: 50px;
      transition: transform 0.4s ease, background 0.5s ease;
      flex-shrink: 0;
    }

    .arm-left { transform-origin: right center; }
    .arm-right { transform-origin: left center; }

    .head {
      width: 140px;
      height: 140px;
      background: #6C63FF;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.5s ease;
      flex-shrink: 0;
    }

    .eyebrows {
      display: flex;
      gap: 32px;
      margin-bottom: 5px;
    }

    .eyebrow {
      width: 26px;
      height: 5px;
      background: white;
      border-radius: 10px;
      transition: transform 0.4s ease;
    }

    .eyes {
      display: flex;
      gap: 24px;
      margin-bottom: 8px;
    }

    .eye {
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .pupil {
      width: 11px;
      height: 11px;
      background: #1a1a2e;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .mouth {
      width: 40px;
      height: 14px;
      background: white;
      border-radius: 50px;
      transition: all 0.4s ease;
    }

    .legs {
      display: flex;
      gap: 16px;
      margin-top: 6px;
    }

    .leg {
      width: 20px;
      height: 44px;
      background: #6C63FF;
      border-radius: 50px;
      transition: background 0.5s ease;
    }

    /* ANIMATIONS */
    @keyframes idle-float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    @keyframes inspired-jump {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1,1); }
      20% { transform: translateX(-50%) translateY(-35px) scale(0.94,1.06); }
      40% { transform: translateX(-50%) translateY(0) scale(1.06,0.94); }
      60% { transform: translateX(-50%) translateY(-20px) scale(0.97,1.03); }
      80% { transform: translateX(-50%) translateY(0) scale(1.02,0.98); }
    }

    @keyframes blocked-slump {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    @keyframes caff-shake {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      15% { transform: translateX(calc(-50% - 8px)) rotate(-4deg); }
      30% { transform: translateX(calc(-50% + 8px)) rotate(4deg); }
      45% { transform: translateX(calc(-50% - 6px)) rotate(-2deg); }
      60% { transform: translateX(calc(-50% + 6px)) rotate(2deg); }
      75% { transform: translateX(calc(-50% - 4px)) rotate(-3deg); }
      90% { transform: translateX(calc(-50% + 4px)) rotate(3deg); }
    }

    @keyframes thinking-tilt {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      50% { transform: translateX(-50%) rotate(-6deg); }
    }

    @keyframes celebrating-jump {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1,1); }
      15% { transform: translateX(-50%) translateY(-50px) scale(0.92,1.08); }
      30% { transform: translateX(-50%) translateY(0) scale(1.1,0.9); }
      50% { transform: translateX(-50%) translateY(-30px) scale(0.95,1.05); }
      65% { transform: translateX(-50%) translateY(0) scale(1.05,0.95); }
    }

    .bloo-wrapper.inspired { animation: inspired-jump 0.8s ease-in-out infinite; }
    .bloo-wrapper.blocked { animation: blocked-slump 3s ease-in-out infinite; }
    .bloo-wrapper.caffeinated { animation: caff-shake 0.35s ease-in-out infinite; }
    .bloo-wrapper.thinking { animation: thinking-tilt 2s ease-in-out infinite; }
    .bloo-wrapper.celebrating { animation: celebrating-jump 0.7s ease-in-out infinite; }

    /* EXPRESSIONS */
    .inspired .arm-left { transform: rotate(-55deg) translateY(-10px); }
    .inspired .arm-right { transform: rotate(55deg) translateY(-10px); }
    .inspired .eyebrow-left { transform: rotate(-8deg) translateY(-4px); }
    .inspired .eyebrow-right { transform: rotate(8deg) translateY(-4px); }
    .inspired .mouth { border-radius: 0 0 50px 50px; height: 18px; width: 50px; }
    .inspired .eye { width: 27px; height: 27px; }
    .inspired .head { background: #7C6FFF; }
    .inspired .arm, .inspired .leg { background: #7C6FFF; }

    .blocked .arm-left { transform: rotate(35deg) translateY(8px); }
    .blocked .arm-right { transform: rotate(-35deg) translateY(8px); }
    .blocked .eyebrow-left { transform: rotate(15deg) translateY(4px); }
    .blocked .eyebrow-right { transform: rotate(-15deg) translateY(4px); }
    .blocked .mouth { border-radius: 50px 50px 0 0; background: #aaa; width: 32px; height: 12px; margin-top: 5px; }
    .blocked .head { background: #4a4a6a; }
    .blocked .arm, .blocked .leg { background: #4a4a6a; }
    .blocked .eye { width: 20px; height: 13px; }

    .caffeinated .arm-left { transform: rotate(-75deg) translateY(-14px); }
    .caffeinated .arm-right { transform: rotate(75deg) translateY(-14px); }
    .caffeinated .eyebrow-left { transform: translateY(-7px); }
    .caffeinated .eyebrow-right { transform: translateY(-7px); }
    .caffeinated .mouth { width: 48px; height: 18px; }
    .caffeinated .eye { width: 30px; height: 30px; }
    .caffeinated .pupil { width: 7px; height: 7px; }
    .caffeinated .head { background: #8B6FFF; }
    .caffeinated .arm, .caffeinated .leg { background: #8B6FFF; }

    .thinking .arm-left { transform: rotate(-15deg) translateY(4px); }
    .thinking .arm-right { transform: rotate(-65deg) translateY(-18px); }
    .thinking .eyebrow-left { transform: translateY(-3px); }
    .thinking .eyebrow-right { transform: translateY(-6px) rotate(-5deg); }
    .thinking .pupil { transform: translateY(-5px); }
    .thinking .mouth { width: 28px; height: 9px; }
    .thinking .head { background: #5B8FFF; }
    .thinking .arm, .thinking .leg { background: #5B8FFF; }

    .celebrating .arm-left { transform: rotate(-85deg) translateY(-20px); }
    .celebrating .arm-right { transform: rotate(85deg) translateY(-20px); }
    .celebrating .eyebrow-left { transform: rotate(-10deg) translateY(-7px); }
    .celebrating .eyebrow-right { transform: rotate(10deg) translateY(-7px); }
    .celebrating .mouth { border-radius: 0 0 50px 50px; height: 22px; width: 56px; }
    .celebrating .eye { width: 29px; height: 29px; }
    .celebrating .head { background: #5FBF7F; }
    .celebrating .arm, .celebrating .leg { background: #5FBF7F; }

    /* FLOATING ELEMENTS */
    .float-el {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .show-inspired .sparkle { opacity: 1; }
    .show-caffeinated .coffee-el { opacity: 1; }
    .show-celebrating .confetti-el { opacity: 1; }
    .show-thinking .think-el { opacity: 1; }

    .sp1 { top: 30px; left: 60px; animation: float1 1.2s ease-in-out infinite; }
    .sp2 { top: 50px; right: 60px; animation: float2 1s ease-in-out infinite 0.2s; }
    .sp3 { top: 100px; left: 40px; animation: float1 1.4s ease-in-out infinite 0.4s; }
    .ce1 { top: 20px; right: 80px; animation: float1 0.5s ease-in-out infinite; }
    .ce2 { top: 60px; left: 50px; animation: float2 0.4s ease-in-out infinite 0.1s; }
    .cf1 { top: 20px; left: 80px; animation: float1 0.6s ease-in-out infinite; }
    .cf2 { top: 40px; right: 60px; animation: float2 0.5s ease-in-out infinite 0.15s; }
    .cf3 { top: 80px; right: 40px; animation: float1 0.7s ease-in-out infinite 0.3s; }
    .th1 { top: 30px; right: 70px; animation: float2 2s ease-in-out infinite; }
    .th2 { top: 55px; right: 50px; font-size: 0.7rem; animation: float2 2s ease-in-out infinite 0.3s; }

    @keyframes float1 {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.15); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(20deg); }
    }

    /* MOOD LABEL */
    .mood-label {
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      min-height: 26px;
      color: #6C63FF;
      transition: color 0.4s ease;
      text-align: center;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
    }

    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.3s;
      letter-spacing: 0.02em;
    }

    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: scale(0.96); }

    .btn-inspired { background: #6C63FF; color: #fff; }
    .btn-inspired.active { box-shadow: 0 0 24px #6C63FFaa; }
    .btn-blocked { background: #2a2a3a; color: #888; border: 1px solid #333; }
    .btn-blocked.active { color: #aaa; box-shadow: 0 0 16px #333; }
    .btn-caffeinated { background: #F59E0B; color: #1a1a1a; }
    .btn-caffeinated.active { box-shadow: 0 0 24px #F59E0Baa; }
    .btn-thinking { background: #3B6FFF; color: #fff; }
    .btn-thinking.active { box-shadow: 0 0 24px #3B6FFFaa; }
    .btn-celebrating { background: #22C55E; color: #fff; }
    .btn-celebrating.active { box-shadow: 0 0 24px #22C55Eaa; }

    .keyboard-hint {
      margin-top: 10px;
      font-size: 0.68rem;
      color: #2a2a3a;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .tagline {
      margin-top: 16px;
      font-size: 0.68rem;
      color: #2a2a3a;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MOODBOARD</h1>
  <p class="subtitle">How are you feeling today?</p>

  <div class="scene" id="scene">
    <div class="glow" id="glow"></div>

    <!-- Floating elements -->
    <span class="float-el sparkle sp1">✨</span>
    <span class="float-el sparkle sp2">⭐</span>
    <span class="float-el sparkle sp3">💡</span>
    <span class="float-el coffee-el ce1">⚡</span>
    <span class="float-el coffee-el ce2">☕</span>
    <span class="float-el confetti-el cf1">🎉</span>
    <span class="float-el confetti-el cf2">🎊</span>
    <span class="float-el confetti-el cf3">✦</span>
    <span class="float-el think-el th1">💭</span>
    <span class="float-el think-el th2">•••</span>

    <!-- BLOO -->
    <div class="bloo-wrapper" id="bloo">
      <div class="arms-row">
        <div class="arm arm-left"></div>
        <div class="head">
          <div class="eyebrows">
            <div class="eyebrow eyebrow-left"></div>
            <div class="eyebrow eyebrow-right"></div>
          </div>
          <div class="eyes">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
          <div class="mouth"></div>
        </div>
        <div class="arm arm-right"></div>
      </div>
      <div class="legs">
        <div class="leg"></div>
        <div class="leg"></div>
      </div>
    </div>

    <!-- Desk -->
    <div class="desk"></div>

    <!-- Props -->
    <div class="coffee-cup">
      <div class="cup-steam">〰</div>
      <div class="cup-rim"></div>
      <div class="cup-body"></div>
    </div>

    <div class="sticky-notes">
      <div class="note note-1"></div>
      <div class="note note-2"></div>
    </div>

    <div class="pencil"></div>
  </div>

  <div class="mood-label" id="mood-label">✦ Idle — just vibing at the desk</div>

  <div class="buttons">
    <button class="btn btn-inspired" onclick="setMood('inspired')">✨ Inspired</button>
    <button class="btn btn-blocked" onclick="setMood('blocked')">😩 Blocked</button>
    <button class="btn btn-caffeinated" onclick="setMood('caffeinated')">☕ Caffeinated</button>
    <button class="btn btn-thinking" onclick="setMood('thinking')">🤔 Thinking</button>
    <button class="btn btn-celebrating" onclick="setMood('celebrating')">🎉 Celebrating</button>
  </div>

  <p class="keyboard-hint">Keys: 1 · 2 · 3 · 4 · 5</p>
  <p class="tagline">BUILT WITH RIVE · MOODBOARD · #characterchallenge</p>

  <script>
    const moods = {
      inspired: { label: '✨ Inspired — ideas are flowing!', color: '#8B83FF', glow: '#6C63FF', op: '0.3', sc: 'show-inspired', bc: 'mood-inspired' },
      blocked: { label: '😩 Blocked — send help (and snacks)', color: '#444', glow: '#1a1a2a', op: '0.1', sc: 'show-blocked', bc: 'mood-blocked' },
      caffeinated: { label: '☕ Caffeinated — LETS GOOO!!', color: '#F59E0B', glow: '#F59E0B', op: '0.2', sc: 'show-caffeinated', bc: 'mood-caffeinated' },
      thinking: { label: '🤔 Thinking — give me a moment...', color: '#5B8FFF', glow: '#3B6FFF', op: '0.2', sc: 'show-thinking', bc: 'mood-thinking' },
      celebrating: { label: '🎉 Celebrating — WE DID IT!!', color: '#22C55E', glow: '#22C55E', op: '0.25', sc: 'show-celebrating', bc: 'mood-celebrating' }
    };

    let current = null;

    function setMood(mood) {
      const bloo = document.getElementById('bloo');
      const glow = document.getElementById('glow');
      const label = document.getElementById('mood-label');
      const scene = document.getElementById('scene');

      bloo.classList.remove('inspired','blocked','caffeinated','thinking','celebrating');
      scene.classList.remove('show-inspired','show-blocked','show-caffeinated','show-thinking','show-celebrating');
      document.body.classList.remove('mood-inspired','mood-blocked','mood-caffeinated','mood-thinking','mood-celebrating');
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));

      if (current === mood) {
        current = null;
        label.textContent = '✦ Idle — just vibing at the desk';
        label.style.color = '#6C63FF';
        glow.style.background = '#6C63FF';
        glow.style.opacity = '0.15';
        return;
      }

      current = mood;
      const m = moods[mood];
      bloo.classList.add(mood);
      scene.classList.add(m.sc);
      document.body.classList.add(m.bc);
      label.textContent = m.label;
      label.style.color = m.color;
      glow.style.background = m.glow;
      glow.style.opacity = m.op;
      document.querySelector('.btn-' + mood).classList.add('active');
    }

    document.addEventListener('keydown', e => {
      const k = {'1':'inspired','2':'blocked','3':'caffeinated','4':'thinking','5':'celebrating'};
      if (k[e.key]) setMood(k[e.key]);
    });
  </script>
</body>
</html>
