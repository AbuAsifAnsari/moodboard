<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOODBOARD — Meet BLOO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      overflow: hidden;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: #666;
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* STAGE */
    .stage {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 32px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #6C63FF;
      filter: blur(60px);
      opacity: 0.2;
      transition: background 0.5s ease, opacity 0.5s ease;
    }

    /* BLOO body */
    .bloo {
      position: relative;
      z-index: 2;
      width: 180px;
      height: 180px;
      background: #6C63FF;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: idle-bounce 2s ease-in-out infinite;
      transition: background 0.5s ease;
    }

    /* EYES */
    .eyes {
      display: flex;
      gap: 28px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .eye {
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: relative;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .pupil {
      width: 10px;
      height: 10px;
      background: #1a1a2e;
      border-radius: 50%;
      position: absolute;
      top: 6px;
      left: 6px;
      transition: all 0.3s ease;
    }

    /* MOUTH */
    .mouth {
      width: 44px;
      height: 16px;
      background: white;
      border-radius: 50px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    /* IDLE animation */
    @keyframes idle-bounce {
      0%, 100% { transform: translateY(0px) scale(1, 1); }
      50% { transform: translateY(-12px) scale(1.02, 0.98); }
    }

    /* INSPIRED animation */
    @keyframes inspired-bounce {
      0%, 100% { transform: translateY(0px) scale(1, 1); }
      20% { transform: translateY(-28px) scale(0.95, 1.05); }
      40% { transform: translateY(0px) scale(1.05, 0.95); }
      60% { transform: translateY(-16px) scale(0.97, 1.03); }
      80% { transform: translateY(0px) scale(1.02, 0.98); }
    }

    /* BLOCKED animation */
    @keyframes blocked-slump {
      0%, 100% { transform: translateY(0px) scale(1, 1); }
      50% { transform: translateY(8px) scale(1.04, 0.96); }
    }

    /* CAFFEINATED animation */
    @keyframes caffeinated-shake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      10% { transform: translateX(-8px) rotate(-3deg); }
      20% { transform: translateX(8px) rotate(3deg); }
      30% { transform: translateX(-6px) rotate(-2deg); }
      40% { transform: translateX(6px) rotate(2deg); }
      50% { transform: translateX(-4px) rotate(-1deg); }
      60% { transform: translateX(4px) rotate(1deg); }
      70% { transform: translateX(-8px) rotate(-3deg); }
      80% { transform: translateX(8px) rotate(3deg); }
      90% { transform: translateX(-4px) rotate(-1deg); }
    }

    /* State classes */
    .bloo.inspired {
      animation: inspired-bounce 0.7s ease-in-out infinite;
      background: #7C6FFF;
    }

    .bloo.blocked {
      animation: blocked-slump 3s ease-in-out infinite;
      background: #4a4a6a;
    }

    .bloo.caffeinated {
      animation: caffeinated-shake 0.4s ease-in-out infinite;
      background: #8B6FFF;
    }

    /* Eye states */
    .bloo.inspired .eye {
      width: 26px;
      height: 26px;
    }

    .bloo.blocked .eye {
      width: 20px;
      height: 10px;
      border-radius: 50%;
    }

    .bloo.blocked .pupil {
      top: 2px;
    }

    .bloo.caffeinated .eye {
      width: 28px;
      height: 28px;
    }

    .bloo.caffeinated .pupil {
      width: 8px;
      height: 8px;
      top: 4px;
      left: 4px;
    }

    /* Mouth states */
    .bloo.inspired .mouth {
      width: 54px;
      height: 20px;
      border-radius: 0 0 30px 30px;
      background: white;
    }

    .bloo.blocked .mouth {
      width: 36px;
      height: 12px;
      border-radius: 30px 30px 0 0;
      margin-top: 6px;
      background: #888;
    }

    .bloo.caffeinated .mouth {
      width: 48px;
      height: 18px;
      border-radius: 50px;
      background: white;
    }

    /* Sparkles for inspired */
    .sparkle {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .bloo.inspired ~ .sparkle { opacity: 1; }

    .sp1 { top: 10px; left: 20px; animation: float1 1.2s ease-in-out infinite; }
    .sp2 { top: 20px; right: 10px; animation: float2 1s ease-in-out infinite 0.2s; }
    .sp3 { bottom: 20px; left: 10px; animation: float1 1.4s ease-in-out infinite 0.4s; }

    @keyframes float1 {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
      50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-8px) rotate(20deg); opacity: 1; }
    }

    /* Coffee drops for caffeinated */
    .coffee-drop {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      pointer-events: none;
    }
    .bloo.caffeinated ~ .coffee-drop { opacity: 1; }
    .cd1 { top: 0; right: 20px; animation: drop1 0.5s ease-in-out infinite; }
    .cd2 { top: 10px; left: 15px; animation: drop1 0.5s ease-in-out infinite 0.15s; }
    @keyframes drop1 {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-12px); opacity: 0.6; }
    }

    /* MOOD LABEL */
    .mood-label {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      min-height: 28px;
      color: #6C63FF;
      transition: color 0.4s ease;
      text-align: center;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.3s;
      letter-spacing: 0.02em;
    }

    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: scale(0.96); }

    .btn-inspired { background: #6C63FF; color: #fff; }
    .btn-inspired.active { box-shadow: 0 0 28px #6C63FFaa; }

    .btn-blocked { background: #2a2a3a; color: #888; border: 1px solid #333; }
    .btn-blocked.active { box-shadow: 0 0 20px #2a2a3aaa; color: #aaa; }

    .btn-caffeinated { background: #F59E0B; color: #1a1a1a; }
    .btn-caffeinated.active { box-shadow: 0 0 28px #F59E0Baa; }

    .tagline {
      margin-top: 36px;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>MOODBOARD</h1>
  <p class="subtitle">How are you feeling today?</p>

  <div class="stage">
    <div class="glow" id="glow"></div>

    <div class="bloo" id="bloo">
      <div class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <div class="mouth"></div>
    </div>

    <!-- Sparkles -->
    <span class="sparkle sp1">✨</span>
    <span class="sparkle sp2">⭐</span>
    <span class="sparkle sp3">💡</span>

    <!-- Coffee -->
    <span class="coffee-drop cd1">☕</span>
    <span class="coffee-drop cd2">⚡</span>
  </div>

  <div class="mood-label" id="mood-label">✦ Idle — just vibing</div>

  <div class="buttons">
    <button class="btn btn-inspired" onclick="setMood('inspired')">✨ Inspired</button>
    <button class="btn btn-blocked" onclick="setMood('blocked')">😩 Blocked</button>
    <button class="btn btn-caffeinated" onclick="setMood('caffeinated')">☕ Caffeinated</button>
  </div>

  <p class="tagline">BUILT WITH RIVE · MOODBOARD · INTERACTIVE CHARACTER CHALLENGE</p>

  <script>
    const moods = {
      inspired: {
        label: '✨ Inspired — ready to create!',
        labelColor: '#8B83FF',
        glow: '#6C63FF',
        glowOpacity: '0.3'
      },
      blocked: {
        label: '😩 Blocked — send help (and snacks)',
        labelColor: '#555',
        glow: '#2a2a3a',
        glowOpacity: '0.15'
      },
      caffeinated: {
        label: '☕ Caffeinated — LETS GOOO!!',
        labelColor: '#F59E0B',
        glow: '#F59E0B',
        glowOpacity: '0.25'
      }
    };

    let currentMood = null;

    function setMood(mood) {
      const bloo = document.getElementById('bloo');
      const glow = document.getElementById('glow');
      const label = document.getElementById('mood-label');

      // Remove all mood classes
      bloo.classList.remove('inspired', 'blocked', 'caffeinated');

      // Toggle — click same button = go idle
      if (currentMood === mood) {
        currentMood = null;
        label.textContent = '✦ Idle — just vibing';
        label.style.color = '#6C63FF';
        glow.style.background = '#6C63FF';
        glow.style.opacity = '0.2';
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        return;
      }

      // Set new mood
      currentMood = mood;
      bloo.classList.add(mood);
      label.textContent = moods[mood].label;
      label.style.color = moods[mood].labelColor;
      glow.style.background = moods[mood].glow;
      glow.style.opacity = moods[mood].glowOpacity;

      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.btn-' + mood).classList.add('active');
    }
  </script>

</body>
</html>
